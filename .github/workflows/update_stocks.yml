name: Update Stocks Data Weekly

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  workflow_dispatch:

jobs:
  update-stocks:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6h max — 6800 tickers × ~1.5s = ~3h expected

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance curl_cffi requests pandas

      - name: Run weekly stock update
        run: python data_persist/update_stocks.py

      - name: Commit and push updated ticker_info.json
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add data_persist/ticker_info.json
          git diff --staged --quiet || git commit -m "Weekly ticker_info refresh $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
